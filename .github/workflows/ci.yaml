name: "CI"

on:
  push:
    branches:
      - main
  pull_request:

env:
  GO_VERSION: 1.24.0

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check go mod
        run: |
          go mod tidy
          git diff --exit-code go.mod

      - name: Build
        run: go install ./...

      - name: Check tests
        run: go test -tags=rgb ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7.0.0
        with:
          version: latest
          skip-build-cache: true
          skip-pkg-cache: true