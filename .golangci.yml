version: "2"
run:
  issues-exit-code: 1
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  enable:
    - bidichk
    - bodyclose
    - copyloopvar
    - dogsled
    - durationcheck
    - err113
    - gocritic
    - godot
    - goprintffuncname
    - importas
    - makezero
    - misspell
    - nakedret
    - nilerr
    - noctx
    - revive
    - unconvert
    - usetesting
    - wastedassign
  disable:
    - asciicheck
    - containedctx
    - contextcheck
    - cyclop
    - decorder
    - depguard
    - dupl
    - errchkjson
    - errname
    - exhaustive
    - forbidigo
    - funlen
    - gocognit
    - goconst
    - gocyclo
    - godox
    - goheader
    - gomoddirectives
    - gomodguard
    - gosec
    - grouper
    - ireturn
    - lll
    - maintidx
    - nlreturn
    - nolintlint
    - paralleltest
    - predeclared
    - promlinter
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - tagliatelle
    - testpackage
    - thelper
    - tparallel
    - unused
    - varnamelen
    - wrapcheck
    - wsl
  settings:
    dogsled:
      max-blank-identifiers: 3
    dupl:
      threshold: 150
    errcheck:
      check-type-assertions: false
      check-blank: false
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - ifElseChain
    gocyclo:
      min-complexity: 10
    lll:
      line-length: 140
      tab-width: 1
    misspell:
      ignore-rules:
        - sucess
    nakedret:
      max-func-lines: 30
    prealloc:
      simple: true
      range-loops: true
      for-loops: false
  exclusions:
    generated: lax
    rules:
      - linters:
          - err113
        text: do not define dynamic errors
      - linters:
          - revive
        text: if-return
      - linters:
          - revive
        text: var-naming
      - linters:
          - revive
        text: error-return
      - linters:
          - revive
        text: package-comments
      - linters:
          - revive
        text: superfluous-else
      - linters:
          - revive
        text: indent-error-flow
      - linters:
          - revive
        text: unused-parameter
      - linters:
          - revive
        text: empty-block
      - linters:
          - revive
        text: redefines-builtin-id
    paths:
      - .*\.pb\.go$
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/BoostyLabs/hotpot-sdk-go
  exclusions:
    generated: lax
    paths:
      - .*\.pb\.go$
      - third_party$
      - builtin$
      - examples$